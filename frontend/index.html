<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CarHub — Plataforma premium de gestión y visualización de coches de lujo" />
  <title>CarHub 🏎 — Plataforma de coches de lujo</title>

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- App Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
</head>
<body>

  <!--
    The entire UI is injected into <body> by app.js.
    This <noscript> block shows a friendly message when JS is disabled.
  -->
  <noscript>
    <div style="
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100vh; font-family:sans-serif; color:#f0f0f8; background:#0a0a0f; gap:16px;
      text-align:center; padding:20px;
    ">
      <span style="font-size:3rem">🏎</span>
      <h1>CarHub requiere JavaScript</h1>
      <p style="color:#8888a8">Por favor, activa JavaScript en tu navegador para acceder a la plataforma.</p>
    </div>
  </noscript>

  <!-- SPA entry point — loads as ES module to support import/export -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
